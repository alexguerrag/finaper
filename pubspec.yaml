name: finaper
description: "App de finanzas personales para organizar ingresos, gastos, cuentas y presupuestos."
publish_to: 'none'

version: 1.4.18+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  fl_chart: ^0.66.0
  equatable: ^2.0.5
  sqflite: ^2.3.0
  path: ^1.9.0
  intl: ^0.20.2
  path_provider: ^2.1.4
  file_picker: ^11.0.2
  share_plus: ^7.2.2
  open_filex: ^4.7.0
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  sqflite_common_ffi: ^2.3.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon_solid.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true